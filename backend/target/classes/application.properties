# =====================================================
# AI Powered Deep Packet Inspection
# Spring Boot Configuration
# =====================================================

# ==========================
# Server
# ==========================
server.port=${PORT:8080}

# ==========================
# PostgreSQL Database
# ==========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dpi_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ankitstandsalone}

# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate automatically detects PostgreSQL
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================
# File Upload
# ==========================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==========================
# JWT Configuration
# ==========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================
# Logging
# ==========================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO